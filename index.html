<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP UBT KR-MM Dictionary</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu&family=Noto+Sans+KR&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Pyidaungsu', sans-serif; background: #f1f5f9; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; }
        .header { background: #2563eb; color: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 12px; border: 2px solid #2563eb; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        .stats { font-size: 13px; color: #64748b; margin: 10px 0; font-weight: bold; }
        .dict-card { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid #2563eb; }
        .kor { font-weight: bold; color: #1e3a8a; font-size: 18px; display: block; }
        .mm { color: #475569; font-size: 16px; margin-top: 5px; display: block; }
        .no-result { text-align: center; color: #94a3b8; margin-top: 30px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2 style="margin:0">VIP UBT Dictionary</h2>
    </div>
    
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 ရိုက်ရှာပါ..." oninput="search()">
    <div id="stats" class="stats">စကားလုံးပေါင်း: ၀</div>
    
    <div id="resultList">
        <div class="no-result">စကားလုံး ရိုက်ထည့်ပြီး ရှာဖွေပါ။</div>
    </div>
</div>

<script>
    // ပုံ ၁၀ ထဲကလို ရှာမရတဲ့ ပြဿနာကို ပြင်ရန် Base64 ဒေတာကို စနစ်တကျ ထည့်ထားခြင်း
    const encodedData = "eyLtlZnqtZAnOiAi4ZCc4ZCY4ZC04ZCE4ZCxIiwgIuyCrOqzvCI6ICL aquarium04ZCs4ZCG4ZC64ZCs4ZCxIiwgIuyatOycoCI6ICL aquarium54ZC74ZCs4ZC64ZC74ZCsIiwgIuyVhOydtCI6ICL aquarium04ZC04ZCs4ZC4IiwgIuqwgOuwqSI6ICL aquariumY4ZC64ZCc4ZCxIn0=";

    function getDecodedData() {
        try {
            // " aquarium" စာသားအမှားကို ဖြတ်ထုတ်ခြင်း
            const cleanData = encodedData.replace(/ aquarium/g, "");
            // Base64 မှ စာသားအဖြစ် ပြောင်းလဲခြင်း
            const decodedString = atob(cleanData); 
            // Unicode Handling (စာလုံးမပျက်စေရန်)
            return JSON.parse(decodeURIComponent(escape(decodedString)));
        } catch (e) {
            console.error("Data error:", e);
            return {};
        }
    }

    const dictionaryData = getDecodedData();

    function search() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        const resultList = document.getElementById('resultList');
        resultList.innerHTML = "";
        
        if (query === "") {
            resultList.innerHTML = '<div class="no-result">စကားလုံး ရိုက်ထည့်ပြီး ရှာဖွေပါ။</div>';
            return;
        }

        let count = 0;
        for (let [kor, mm] of Object.entries(dictionaryData)) {
            if (kor.toLowerCase().includes(query) || mm.toLowerCase().includes(query)) {
                resultList.innerHTML += `
                    <div class="dict-card">
                        <span class="kor">${kor}</span>
                        <span class="mm">${mm}</span>
                    </div>`;
                count++;
            }
        }

        if (count === 0) {
            resultList.innerHTML = '<div class="no-result">ရှာမတွေ့ပါ။</div>';
        }
    }

    // စတင်ချိန်တွင် အရေအတွက်ပြရန်
    document.getElementById('stats').innerText = `စကားလုံးပေါင်း: ${Object.keys(dictionaryData).length}`;
</script>

</body>
</html>
