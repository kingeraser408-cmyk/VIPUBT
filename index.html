<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2026 UBT & Colour Blind Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@400;700&family=Pyidaungsu:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --success: #00ff87; --danger: #ff0055; --dark: #080e1a; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Montserrat', 'Pyidaungsu', sans-serif; }
        body { background: var(--dark); margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; color: #fff; }

        .screen { position: fixed; inset: 0; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle, #1e293b, #080e1a); }
        .card { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(20px); width: 100%; max-width: 450px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center; overflow: hidden; }
        .card-header { background: linear-gradient(90deg, var(--primary), var(--secondary)); padding: 25px; font-family: 'Orbitron'; font-weight: bold; }

        #exam-screen { display: none; flex-direction: column; height: 100dvh; background: #f8fafc; color: var(--text); }
        .ubt-header { display: flex; background: #0f172a; color: #fff; height: 55px; border-bottom: 4px solid var(--primary); }
        .h-box { flex: 1; border-right: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; }

        .main-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; padding: 12px; gap: 12px; }
        .q-pane { flex: 1; background: #fff; border-radius: 20px; padding: 15px; border: 2px solid #e2e8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; overflow-y: auto; }
        .a-pane { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; }

        .ans-item { background: #fff; border-radius: 18px; border: 2px solid #e2e8f0; cursor: pointer; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; font-weight: 700; font-size: 14px; text-align: center; color: var(--text); transition: all 0.2s; }
        .ans-item.selected { background: var(--secondary) !important; border-color: var(--primary) !important; color: #fff !important; }
        .ans-item.correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #166534 !important; }
        .ans-item.wrong { background: #fee2e2 !important; border-color: var(--danger) !important; color: #991b1b !important; }

        .ans-num { position: absolute; top: 8px; left: 8px; width: 22px; height: 22px; border-radius: 50%; border: 2px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 10px; }

        .audio-box { width: 100%; background: #eff6ff; padding: 10px; border-radius: 12px; border-left: 5px solid var(--secondary); margin-bottom: 5px; }
        .audio-btn { 
            background: var(--secondary) !important; color: white !important; border: none !important; 
            border-radius: 50% !important; width: 40px; height: 40px; 
            display: inline-flex; align-items: center; justify-content: center; 
            font-size: 18px; cursor: pointer; transition: 0.2s; 
        }
        .audio-btn:disabled { background: #94a3b8 !important; cursor: not-allowed; }

        .ubt-footer { display: flex; height: 70px; background: #0f172a; padding: 12px; gap: 10px; }
        .f-btn { flex: 1; background: rgba(255,255,255,0.1); color: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .f-btn.locked { opacity: 0.3; pointer-events: none; }
       
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 250px; margin: 10px auto; }
        .key { background: #f1f5f9; border: none; padding: 12px; border-radius: 10px; font-size: 18px; font-weight: 800; cursor: pointer; color: var(--dark); }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="card">
            <div class="card-header">2026 UBT & Colour Blind Test</div>
            <div style="padding: 35px;">
                <input type="text" id="user-name" style="width:100%; padding:18px; background:rgba(255,255,255,0.1); border:2px solid var(--primary); border-radius:15px; color:#fff; text-align:center; font-size:18px; outline:none;" placeholder="Enter Name">
                <button onclick="startExam()" style="width:100%; padding:18px; border-radius:15px; background:var(--success); border:none; font-weight:800; cursor:pointer; margin-top:20px;">START EXAM</button>
                <p onclick="logout()" style="color: #64748b; margin-top: 20px; cursor: pointer; font-size: 14px; text-decoration: underline;">
                Clear Saved ID / Logout
            </p>
            </div>
        </div>
    </div>

    <div id="exam-screen">
        <div class="ubt-header">
            <div class="h-box" id="display-name">NAME</div>
            <div class="h-box" id="timer-val" style="color:var(--success); font-size:18px;">50:00</div>
             <div class="h-box">Solved: <span id="rem-count">0</span>/40</div>
        </div>
        <div class="main-view">
            <div class="q-pane" id="q-content"></div>
            <div class="a-pane" id="ans-list"></div>
        </div>
        <div class="ubt-footer">
            <div class="f-btn" id="btn-prev" onclick="step(-1)">PREV</div>
            <div class="f-btn" id="btn-list" onclick="openGrid()">LIST</div>
            <div class="f-btn" id="btn-next" onclick="step(1)">NEXT</div>
            <div class="f-btn" id="footer-action-btn" style="background:var(--danger);">FINISH</div>
        </div>
    </div>

    <div id="cb-screen" class="screen" style="display:none;">
        <div class="card" style="background:#fff; color:#000;">
            <div class="card-header" style="color:white; padding:15px;">COLOUR BLIND TEST</div>
            <div style="padding: 15px;">
                <div id="cb-timer-val" style="font-size:25px; color:var(--danger); font-family:Orbitron;">60</div>
                <img id="cb-img" src="" style="width:160px; height:160px; border-radius:50%; margin:10px auto; display:block; border:4px solid #eee;">
                <div id="cb-display" style="font-size:30px; font-weight:bold; height:40px; color:var(--secondary);"></div>
                <div class="keypad">
                    <button class="key" onclick="pressKey('1')">1</button><button class="key" onclick="pressKey('2')">2</button><button class="key" onclick="pressKey('3')">3</button>
                    <button class="key" onclick="pressKey('4')">4</button><button class="key" onclick="pressKey('5')">5</button><button class="key" onclick="pressKey('6')">6</button>
                    <button class="key" onclick="pressKey('7')">7</button><button class="key" onclick="pressKey('8')">8</button><button class="key" onclick="pressKey('9')">9</button>
                    <button class="key" style="background:#ff9f43; color:white;" onclick="pressKey('DEL')">C</button><button class="key" onclick="pressKey('0')">0</button>
                    <button class="key" style="background:var(--success); color:white;" onclick="nextCB()">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen" style="display:none;">
        <div class="card">
            <div class="card-header">EXAM RESULT</div>
            <div style="padding:40px;">
                <h1 id="res-score" style="font-size:60px; color:var(--primary); margin:0;">0</h1>
                <p id="cb-res-text" style="color:var(--success); font-weight:bold;"></p>
                <button onclick="reviewAnswers()" style="width:100%; padding:15px; border-radius:12px; background:var(--success); color:#000; border:none; margin-top:20px; font-weight:bold;">REVIEW ANSWERS</button>
                <button onclick="location.reload()" style="width:100%; padding:15px; border-radius:12px; background:var(--secondary); color:#fff; border:none; margin-top:10px; font-weight:bold;">RETAKE</button>
                <button onclick="logout()" style="width:100%; padding:15px; border-radius:12px; background:var(--danger); color:#fff; border:none; margin-top:10px; font-weight:bold;">LOGOUT (Change ID)</button>
            </div>
        </div>
    </div>

<script>
    // Device ID ဖန်တီးခြင်း (သို့မဟုတ်) ရှိပြီးသားကို ယူခြင်း
function getDeviceId() {
    let id = localStorage.getItem('ubt_device_id');
    if (!id) {
        id = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        localStorage.setItem('ubt_device_id', id);
    }
    return id;
}

// Window load ဖြစ်တဲ့အခါ စစ်ဆေးမယ်
window.onload = function() {
    const savedId = localStorage.getItem('saved_ubt_id');
    if (savedId) {
        // ID ရှိနေရင် Input ထဲ အလိုအလျောက် ထည့်ပေးပြီး Exam စခေါ်မယ်
        document.getElementById('user-name').value = savedId;
        startExam(); 
    }
};

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuHdMTPZSV3NpZi1Ap-kNLhtwX1K5L3JFiV2NAgBdv3C0U774jlmOaR9b_RH6b-Q1z/exec";

    let questions = [], cbQuestions = [], idx = 0;
    let userAns = Array(40).fill(null);
    let playHistory = {};
    let isPlaying = false;
    let examClock = 3000, timerId;
    let isReviewMode = false;
    let cbIdx = 0, cbCorrect = 0, cbClock = 60, currentInput = "";

    const shuffle = (array) => {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    };

    function setPlayingStatus(status) {
        isPlaying = status;
        updateButtonUI();
    }
    
    async function startExam() {
    const nameInput = document.getElementById('user-name').value;
    if(!nameInput) return alert("Enter ID!");

    const startBtn = document.querySelector("#login-screen button");
    const originalText = startBtn.innerText;
    
    startBtn.disabled = true;
    startBtn.innerText = "CHECKING ID...";

    try {
        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" }, 
            body: JSON.stringify({
                id: nameInput,
                deviceId: getDeviceId()
            })
        });

        const resData = await response.json();

        if (resData.result === "SUCCESS") {
            // Login အောင်မြင်ရင် ID ကို အသေမှတ်ထားမယ်
            localStorage.setItem('saved_ubt_id', nameInput);
            proceedToExam(nameInput);
        } 
        else {
            // ID မှားရင် သို့မဟုတ် တခြားဖုန်းဖြစ်နေရင် သိမ်းထားတဲ့ ID ကို ဖျက်ပစ်မယ်
            localStorage.removeItem('saved_ubt_id');
            alert("❌ " + resData.result);
            resetBtn();
        }

    } catch (error) {
        alert("Connection Error!");
        resetBtn();
    }

    function resetBtn() {
        startBtn.disabled = false;
        startBtn.innerText = originalText;
    }
}

// Exam ထဲ ပေးဝင်တဲ့ Logic ကို သီးသန့်ထုတ်လိုက်ခြင်း
function proceedToExam(nameInput) {
localStorage.setItem('saved_ubt_id', nameInput);
    let r_shuffled = shuffle([...readingData]).slice(0, 20);
    let l_shuffled = shuffle([...listeningData]).slice(0, 20);
    let combined = [...r_shuffled, ...l_shuffled];
    
    questions = combined.map(q => {
        let originalCorrect = q.c;
        let shuffledA = shuffle([...q.a]);
        let newCorrectIdx = shuffledA.findIndex(opt => (opt.t === originalCorrect || opt.i === originalCorrect || opt.s === originalCorrect));
        return { ...q, a: shuffledA, c: newCorrectIdx };
    });

    document.getElementById('display-name').innerText = "USER ID: " + nameInput;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('exam-screen').style.display = 'flex';
    render();

    timerId = setInterval(() => {
        if(examClock > 0) {
            examClock--;
            let m = Math.floor(examClock/60), s = examClock%60;
            document.getElementById('timer-val').innerText = `${m}:${s<10?'0':''}${s}`;
        } else { finishExam(); }
    }, 1000);
}

    function render() {
        const qData = questions[idx];
        const qAudioKey = `q_audio_${idx}`;
        if(playHistory[qAudioKey] === undefined) playHistory[qAudioKey] = 0;
        
        let qAudioHtml = qData.audio ? `
            <div class="audio-box" style="display:flex; align-items:center; gap:12px; margin-top:10px;">
                <button id="main-play-btn" onclick="playMainAudio('${qAudioKey}')" class="audio-btn" ${(playHistory[qAudioKey] >= 2 && !isReviewMode) ? 'disabled' : ''}>▶️</button>
                <span style="font-size:12px; color:#64748b; font-weight:bold;">Listen: ${playHistory[qAudioKey]}/2</span>
                <audio id="main-player" src="${qData.audio}"></audio>
            </div>` : '';

        // UI Header: Question Number and Main Text
        let contentHtml = `
            <b style="color:var(--secondary)">QUESTION ${idx+1}/40</b>
            <p style="margin:10px 0; font-weight:bold; color:#000; font-size:16px;">${qData.q}</p>`;
              
        contentHtml += qAudioHtml;
        if (qData.img) {
            contentHtml += `<img src="${qData.img}" style="max-height:150px; border-radius:10px; border:1px solid #ddd; margin-top:10px;">`;
        }

        document.getElementById('q-content').innerHTML = contentHtml;

        // Answer Grid
        document.getElementById('ans-list').innerHTML = qData.a.map((opt, i) => {
            let optKey = `q${idx}_opt${i}`;
            if(playHistory[optKey] === undefined) playHistory[optKey] = 0;

            let answerContent = opt.t ? `<span>${opt.t}</span>` : '';
            
            if (opt.i) answerContent = `<img src="${opt.i}" style="max-height:70px; margin-bottom:5px;">`;

            let optAudio = opt.s ? `<button onclick="event.stopPropagation(); playOptAudio('${idx}','${i}')" class="audio-btn" style="width:30px; height:30px; font-size:14px; margin-top:5px;" ${(playHistory[optKey] >= 2 && !isReviewMode) ? 'disabled' : ''}>▶️<audio id="a-${idx}-${i}" src="${opt.s}"></audio></button>` : '';

            let reviewClass = "";
            if(isReviewMode) {
                if(i === qData.c) reviewClass = "correct";
                else if(userAns[idx] === i) reviewClass = "wrong";
            }

            return `
                <div id="ans-${i}" class="ans-item ${userAns[idx] === i ? 'selected' : ''} ${reviewClass}" onclick="pick(${i})">
                    <div class="ans-num">${i+1}</div>
                    ${answerContent}
                    ${optAudio}
                </div>`;
        }).join('');

        const actionBtn = document.getElementById('footer-action-btn');
        if(isReviewMode) {
            actionBtn.innerText = "EXIT REVIEW";
            actionBtn.style.background = "var(--dark)";
            actionBtn.onclick = exitReview;
        } else {
            actionBtn.innerText = "FINISH";
            actionBtn.style.background = "var(--danger)";
            actionBtn.onclick = finishExam;
        }

        updateButtonUI();
        document.getElementById('rem-count').innerText = userAns.filter(a => a !== null).length;
        attachAudioEvents();
    }

    function attachAudioEvents() {
        document.querySelectorAll('audio').forEach(aud => {
            aud.onplay = () => { 
                setPlayingStatus(true); 
                if(aud.id === 'main-player') document.getElementById('main-play-btn').innerText = '⏸️';
                else aud.parentElement.firstChild.textContent = '⏸️';
            };
            aud.onpause = () => { 
                setPlayingStatus(false); 
                if(aud.id === 'main-player') document.getElementById('main-play-btn').innerText = '▶️';
                else aud.parentElement.firstChild.textContent = '▶️';
            };
            aud.onended = () => {
                setPlayingStatus(false);
                let key = aud.id === 'main-player' ? `q_audio_${idx}` : `q${idx}_opt${aud.id.split('-')[2]}`;
                playHistory[key]++;
                render(); 
            };
        });
    }

    function playMainAudio(key) {
    // အခြားအသံ ဖွင့်နေရင် ထပ်နှိပ်လို့မရအောင် တားခြင်း
    if (isPlaying) return;

    let aud = document.getElementById('main-player');
    if(!aud) return;
    if(!aud.paused) { 
        aud.pause(); 
        aud.currentTime = 0; 
        setPlayingStatus(false);
    } else { 
        stopAllAudio(); 
        aud.play().catch(e => console.log(e)); 
        setPlayingStatus(true);
    }
}

    function playOptAudio(qIdx, oIdx) {
    // အကယ်၍ အသံတစ်ခုခု ဖွင့်နေရင် ဘာမှမလုပ်ဘဲ ပြန်ထွက်သွားမယ်
    if (isPlaying) return; 

    let aud = document.getElementById(`a-${qIdx}-${oIdx}`);
    if(!aud) return;

    if(!aud.paused) { 
        aud.pause(); 
        aud.currentTime = 0; 
        setPlayingStatus(false);
    } else { 
        stopAllAudio(); 
        aud.play().catch(e => console.log(e)); 
        // ဖွင့်လိုက်ပြီဖြစ်ကြောင်း status ကို true ပေးလိုက်တယ်
        setPlayingStatus(true); 
    }
}

    function stopAllAudio() {
        document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
    }

    function pick(i) {
        if(isReviewMode || isPlaying) return;
        userAns[idx] = i;
        render();
    }

    function step(d) {
        if(isPlaying) return;
        if(idx+d >= 0 && idx+d < 40) { idx += d; render(); }
    }

    function updateButtonUI() {
        const btns = ['btn-prev', 'btn-list', 'btn-next'];
        btns.forEach(id => {
            const el = document.getElementById(id);
            if(isPlaying) el.classList.add('locked');
            else el.classList.remove('locked');
        });
    }

    function finishExam() {
        if(isPlaying) return;
        if(!confirm("Start Colour Blind Test?")) return;
        clearInterval(timerId);
        document.getElementById('exam-screen').style.display = 'none';
        document.getElementById('cb-screen').style.display = 'flex';
        cbQuestions = shuffle([...cbMaster]).slice(0, 7);
        renderCB();
        let cbTimer = setInterval(() => { 
            if(cbClock > 0) { 
                cbClock--; 
                document.getElementById('cb-timer-val').innerText = cbClock; 
            } else { clearInterval(cbTimer); showFinal(); } 
        }, 1000);
    }

    function renderCB() {
        if(cbIdx >= cbQuestions.length) return showFinal();
        document.getElementById('cb-img').src = cbQuestions[cbIdx].img;
        currentInput = "";
        document.getElementById('cb-display').innerText = "";
    }

    function pressKey(val) {
        if(val === 'DEL') currentInput = currentInput.slice(0, -1);
        else if(currentInput.length < 3) currentInput += val;
        document.getElementById('cb-display').innerText = currentInput;
    }

    function nextCB() {
        if(currentInput === "") return alert("Enter number");
        if(currentInput === cbQuestions[cbIdx].ans) cbCorrect++;
        cbIdx++; renderCB();
    }

    function showFinal() {
        document.getElementById('cb-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'flex';
        let correctCount = userAns.filter((ans, i) => ans === questions[i].c).length;
        document.getElementById('res-score').innerText = correctCount * 5;
        document.getElementById('cb-res-text').innerText = `Colour Blind Test: ${cbCorrect} / ${cbQuestions.length} Correct`;
    }

    function reviewAnswers() { isReviewMode = true; idx = 0; document.getElementById('result-screen').style.display = 'none'; document.getElementById('exam-screen').style.display = 'flex'; render(); }
    function exitReview() { isReviewMode = false; document.getElementById('exam-screen').style.display = 'none'; document.getElementById('result-screen').style.display = 'flex'; }

    function openGrid() {
        if(isPlaying) return;
        let gridHtml = userAns.map((ans, i) => {
            let bg = "rgba(255,255,255,0.1)";
            if(isReviewMode) {
                if(userAns[i] === questions[i].c) bg = "var(--success)";
                else if(userAns[i] === null) bg = "#64748b";
                else bg = "var(--danger)";
            } else if(ans !== null) bg = "var(--secondary)";
            return `<div onclick="idx=${i};render();document.getElementById('pop').remove();" style="padding:12px; border:1px solid #ddd; border-radius:12px; text-align:center; background:${bg}; color:#fff; cursor:pointer; font-weight:800;">${i+1}</div>`;
        }).join('');
        const pop = document.createElement('div'); pop.id="pop"; pop.style = "position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;";
        pop.innerHTML = `<div style="background:#fff; padding:25px; border-radius:25px; width:100%; max-width:400px;"><div style="display:grid; grid-template-columns:repeat(5,1fr); gap:12px;">${gridHtml}</div><button onclick="this.parentElement.parentElement.remove()" style="width:100%; margin-top:20px; padding:15px; background:var(--dark); color:#fff; border-radius:15px; font-weight:bold;">BACK</button></div>`;
        document.body.appendChild(pop);
    }
