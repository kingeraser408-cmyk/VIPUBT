<!DOCTYPE html>

<head>

    <title>VIP Secure Dictionary</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; text-align: center; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #38bdf8; outline: none; box-sizing: border-box; }
        .id-badge { font-size: 11px; background: #334155; padding: 5px 10px; border-radius: 20px; color: #94a3b8; margin-bottom: 20px; display: inline-block; font-weight: bold; }
        #status { font-weight: bold; margin: 20px 0; color: #fbbf24; }
        #list { text-align: left; max-height: 350px; overflow-y: auto; margin-top: 15px; border-top: 1px solid #334155; }
        .item { padding: 12px; border-bottom: 1px solid #1e293b; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
        .active-user { color: #10b981; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="box">

        <div id="list"></div>
    </div>
</div>

        let fil = {};
        for (let k in _0x_d) {
